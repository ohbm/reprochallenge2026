<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | OHBM-OSSIG Reproducibility Challenge</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="/">
          <img src="https://ossig.netlify.app/images/logos/ossig_logo.svg" alt="OHBM OSSIG logo" />
          <span>OHBM Reproducibility Challenge</span>
        </a>

        <button
          class="menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          aria-label="Toggle navigation"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
          <a href="/" >About</a>
          <a href="/source-projects/" >Source Projects</a>
          <a href="/contact/" aria-current="page">Contact</a>
        </nav>
      </div>
    </header>

    <main id="main-content" class="site-main">
      <section class="page-header container">
  <h1>Contact</h1>
</section>

<section class="container card contact-card">
  <p>
    Contact information and details will be added here soon. In the meantime, please reach out via the
    <a href="https://github.com/KMarshallX/ossig" target="_blank" rel="noopener noreferrer">OHBM OSSIG GitHub page</a>.
  </p>
</section>

    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>© 2026 OHBM Open Science SIG</p>
        <div class="footer-links">
          <a href="https://ossig.netlify.app/" target="_blank" rel="noopener noreferrer">OSSIG Website</a>
          <a href="https://github.com/KMarshallX/ossig" target="_blank" rel="noopener noreferrer">GitHub</a>
        </div>
      </div>
    </footer>

    <script>
      (function() {
        const menuButton = document.querySelector('.menu-toggle');
        const nav = document.querySelector('#site-nav');

        if (!menuButton || !nav) {
          return;
        }

        menuButton.addEventListener('click', function() {
          const isOpen = nav.classList.toggle('is-open');
          menuButton.setAttribute('aria-expanded', String(isOpen));
          document.body.classList.toggle('menu-open', isOpen);
        });

        nav.querySelectorAll('a').forEach(function(link) {
          link.addEventListener('click', function() {
            nav.classList.remove('is-open');
            menuButton.setAttribute('aria-expanded', 'false');
            document.body.classList.remove('menu-open');
          });
        });

        window.addEventListener('resize', function() {
          if (window.innerWidth > 800) {
            nav.classList.remove('is-open');
            menuButton.setAttribute('aria-expanded', 'false');
            document.body.classList.remove('menu-open');
          }
        });
      })();
    </script>
  </body>
</html>
